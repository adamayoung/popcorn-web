name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Assemble publishable files
        run: |
          mkdir -p dist
          cp index.html privacy.html styles.css dist/
          cp -R assets dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=popcorn-web --branch=main
